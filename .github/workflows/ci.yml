name: Node.js CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # 2025 LTS version
          cache: 'npm'      # Enables native GitHub Actions caching for npm

      - name: Install DotenvX
        run: curl -sfS dotenvx.sh | sh
        
      - name: Install dependencies
        # Use 'npm clean-install' for consistent CI builds
        run: npm ci --force

      - name: Run Webpack Config with DotenvX
        run: dotenvx run -f .env.local.encrypted -- node build.js
        env:
          DOTENV_PRIVATE_KEY_LOCAL_ENCRYPTED: ${{ secrets.DOTENV_PRIVATE_KEY_LOCAL_ENCRYPTED }}

      - name: Build with encrypted env
        run: dotenvx run -f .env.local.encrypted -- npm run build --if-present
        env:
          DOTENV_PRIVATE_KEY_LOCAL_ENCRYPTED: ${{ secrets.DOTENV_PRIVATE_KEY_LOCAL_ENCRYPTED }}

      - name: Test
        run: npm test

      - name: Build and Push Docker Image
        uses: mr-smithers-excellent/docker-build-push@v6
        with:
          image: zauraliev/zx-app
          tags: latest,${{ github.sha }}
          registry: docker.io
          # ADDED: Enable BuildKit for faster concurrent builds in 2025
          enableBuildKit: true
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
