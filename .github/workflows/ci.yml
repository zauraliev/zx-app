# GitHub Actions Workflow for 2025 Vanilla JS SPA
name: Node.js CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # 2025 LTS Version
          cache: 'npm'

      - name: Install dependencies
        # Use 'npm ci' for a clean, reproducible build in CI environments
        run: npm ci --force

      - name: Run Webpack Config with DotenvX
        # CHANGED: Use npx @dotenvx/dotenvx
        # REASON: Solves 'command not found' (exit code 127). npx handles the binary 
        # pathing automatically so you don't need the curl install step.
        run: npx @dotenvx/dotenvx run -f .env.local.encrypted -- node build.js
        env:
          DOTENV_PRIVATE_KEY_LOCAL_ENCRYPTED: ${{ secrets.DOTENV_PRIVATE_KEY_LOCAL_ENCRYPTED }}

      - name: Build with encrypted env
        run: npx @dotenvx/dotenvx run -f .env.local.encrypted -- npm run build --if-present
        env:
          DOTENV_PRIVATE_KEY_LOCAL_ENCRYPTED: ${{ secrets.DOTENV_PRIVATE_KEY_LOCAL_ENCRYPTED }}

      - name: Test
        run: npm test

      - name: Build and Push Docker Image
        # PRESERVED: Your Docker Hub push logic.
        # NOTE: Ensure your Dockerfile starts with 'FROM node:24-slim' to match.
        uses: mr-smithers-excellent/docker-build-push@v6
        with:
          image: zauraliev/zx-app
          tags: latest,${{ github.sha }}
          registry: docker.io
          enableBuildKit: true
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
